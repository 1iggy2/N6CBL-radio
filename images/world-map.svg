  <!-- DM03tu marker (Los Angeles): lat 33.8°N, lon -118.4° -->
  <!-- x = (180 + (-118.4)) × 2.778 = 171, y = (90 - 33.8) × 2.778 = 156 -->
  <g>
    <!-- Subtle crosshair -->
    <line x1="171" y1="0" x2="171" y2="500" stroke="#c8401a" stroke-width="0.4" stroke-dasharray="2,4" opacity="0.4"/>
    <line x1="0" y1="156" x2="1000" y2="156" stroke="#c8401a" stroke-width="0.4" stroke-dasharray="2,4" opacity="0.4"/>
    <!-- Marker dot + ring -->
    <circle cx="171" cy="156" r="3.5" fill="#c8401a"/>
    <circle cx="171" cy="156" r="8" fill="none" stroke="#c8401a" stroke-width="1.2"/>
    <circle cx="171" cy="156" r="14" fill="none" stroke="#c8401a" stroke-width="0.6" opacity="0.5"/>
    <!-- Label -->
    <text x="184" y="153" fill="#c8401a" font-family="Consolas, Menlo, monospace" font-size="11" font-weight="bold">DM03tu</text>
    <text x="184" y="166" fill="#c8401a" font-family="Consolas, Menlo, monospace" font-size="9" opacity="0.75">N6CBL · LAX</text>
  </g>

  <!-- Corner labels -->
  <g fill="#3a4248" font-family="Consolas, Menlo, monospace" font-size="9" letter-spacing="0.1em">
    <text x="6" y="14">90°N</text>
    <text x="6" y="496">90°S</text>
    <text x="498" y="14" text-anchor="end">180°W</text>
    <text x="502" y="14">180°E</text>
    <text x="6" y="254">EQ</text>
  </g>
</svg>
