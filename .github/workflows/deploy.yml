name: Refresh QRZ log and deploy

on:
  schedule:
    - cron: '*/15 * * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch QRZ Logbook ADIF
        env:
          QRZ_LOGBOOK_KEY: ${{ secrets.QRZ_LOGBOOK_KEY }}
          QRZ_LOGBOOK_ADIF_PATH: .cache/qrz-logbook.adi
        run: python3 scripts/fetch-qrz-logbook.py

      - name: Refresh QRZ callsign cache
        env:
          QRZ_USERNAME: ${{ secrets.QRZ_USERNAME }}
          QRZ_PASSWORD: ${{ secrets.QRZ_PASSWORD }}
          QSO_LOG_ADIF_PATH: .cache/qrz-logbook.adi
        run: python3 scripts/enrich-qrz.py

      - name: Process QRZ logbook contacts
        env:
          QSO_LOG_ADIF_PATH: .cache/qrz-logbook.adi
          QSO_LOG_SESSIONIZE: '1'
        run: python3 scripts/process-logs.py

      - name: Commit updated log data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- data/qso-log.json
          if [ -f data/qrz-callsign-cache.json ]; then
            git add -- data/qrz-callsign-cache.json
          fi
          if [ -f data/was-map.svg ]; then
            git add -- data/was-map.svg
          fi
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh QRZ log data [skip ci]"

          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}/3"
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 2))
          done

          echo "Unable to push refreshed QRZ log data after rebasing onto origin/main."
          exit 1

      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
