name: Process logs and deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Process ADIF logs
        run: python3 scripts/process-logs.py

      - name: Commit updated log data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- data/qso-log.json
          if [ -f data/was-map.svg ]; then
            git add -- data/was-map.svg
          fi
          git diff --cached --quiet && exit 0
          git commit -m "chore: regenerate qso-log.json [skip ci]"

          for attempt in 1 2 3; do
            echo "Push attempt ${attempt}/3"
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 2))
          done

          echo "Unable to push regenerated log data after rebasing onto origin/main."
          exit 1

      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
